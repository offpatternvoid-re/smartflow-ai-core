<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SmartFlow AI</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Tailwind CDN fallback -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Content Configuration for CDN -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cluely: {
              primary: '#6366f1',
              secondary: '#8b5cf6',
              text: '#1e293b',
              muted: '#64748b',
              bg: '#f8fafc',
              glass: 'rgba(255, 255, 255, 0.7)',
              border: 'rgba(255, 255, 255, 0.6)'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            'glass-hover': '0 8px 32px 0 rgba(31, 38, 135, 0.12)',
            'btn': '0 4px 14px 0 rgba(99, 102, 241, 0.39)',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body
  class="bg-cluely-bg text-cluely-text font-sans h-screen overflow-hidden selection:bg-cluely-primary selection:text-white">
  <app-root></app-root>
</body>

</html>
